- name: Bring up cockpit and qemu-kvm
  hosts: servers
  become: true

  tasks:
    - name: Install qemu-kvm and cockpit packages
      ansible.builtin.dnf:
        name:
          - qemu-kvm
          - libvirt
          - libvirt-daemon-config-network
          - virt-install
          - cockpit
          - cockpit-machines
        state: present

    - name: Enable and start libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

    - name: Enable and start cockpit
      ansible.builtin.systemd:
        name: cockpit.socket
        enabled: true
        state: started

    - name: Enable cockpit firewall service
      ansible.posix.firewalld:
        service: cockpit
        permanent: true
        immediate: true
        state: enabled
