- name: Bring down homelab network
  hosts: servers

  tasks:
    - name: Populate service facts
      ansible.builtin.service_facts:

    - name: Remove port forwards
      ansible.posix.firewalld:
        forward_port: "{{ item }}"
        permanent: true
        immediate: true
        state: disabled
      loop:
        - "port=80:proto=tcp:toport=8080:toaddr="
        - "port=443:proto=tcp:toport=8443:toaddr="
        - "port=69:proto=udp:toport=8069:toaddr="
      become: true
      when:
        - services['firewalld.service'] is defined
        - services['firewalld.service']['state'] == 'running'

    - name: Bring down network quadlet
      ansible.builtin.import_tasks: ../common/tasks.down.yaml
